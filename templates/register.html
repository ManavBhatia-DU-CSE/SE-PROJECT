{% extends "base.html" %}
<!--
  FnB - Registration Page
  Author: Harsh
  SRS Reference: Section 4.1.2 - Stimulus/Response: Register
  REQ-4.1.1: Users register with unique username and password
  REQ-4.1.3: Role assigned at registration (Student or Teacher)
-->

{% block title %}Register – FnB{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">✦</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join the FnB platform</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">

      <div class="form-group">
        <label for="username" class="form-label">Username <span class="required">*</span></label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-input"
          placeholder="Choose a unique username"
          required
          minlength="3"
          maxlength="30"
          autocomplete="username"
        />
        <span class="form-hint">Must be unique. Min 3 characters.</span>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email <span class="required">*</span></label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="your@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password <span class="required">*</span></label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="At least 6 characters"
          required
          minlength="6"
          autocomplete="new-password"
        />
        <span class="form-hint">Minimum 6 characters.</span>
      </div>

      <div class="form-group">
        <label for="role" class="form-label">Register As <span class="required">*</span></label>
        <select id="role" name="role" class="form-input form-select" required>
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
        <span class="form-hint">Admin accounts are created by the administrator only.</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Create Account</button>

    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="link">Login here</a></p>
    </div>

  </div>
</div>
{% endblock %}
