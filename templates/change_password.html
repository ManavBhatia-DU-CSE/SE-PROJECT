{% extends "base.html" %}
<!--
  FnB - Change Password Page
  Author: Harsh
  SRS Reference: Section 4.1.4 – Authenticated Password Change
  REQ-4.1.4: Users change password from authenticated session
  D-SEC-02: bcrypt hash update
-->

{% block title %}Change Password – FnB{% endblock %}

{% block content %}
<div class="page-wrapper">
  <div class="page-card" style="max-width: 480px; margin: 60px auto;">

    <div class="page-header">
      <h2 class="page-title">🔒 Change Password</h2>
      <p class="page-subtitle">Update your account password securely.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.change_password') }}" class="auth-form">

      <div class="form-group">
        <label for="current_password" class="form-label">Current Password <span class="required">*</span></label>
        <input
          type="password"
          id="current_password"
          name="current_password"
          class="form-input"
          placeholder="Enter current password"
          required
        />
      </div>

      <div class="form-group">
        <label for="new_password" class="form-label">New Password <span class="required">*</span></label>
        <input
          type="password"
          id="new_password"
          name="new_password"
          class="form-input"
          placeholder="Enter new password"
          required
          minlength="6"
        />
        <span class="form-hint">Minimum 6 characters.</span>
      </div>

      <div class="form-group">
        <label for="confirm_password" class="form-label">Confirm New Password <span class="required">*</span></label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          class="form-input"
          placeholder="Repeat new password"
          required
          minlength="6"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full">Update Password</button>

    </form>

    <div style="text-align:center; margin-top: 1rem;">
      <a href="{{ url_for('index') }}" class="link">← Back to Dashboard</a>
    </div>

  </div>
</div>
{% endblock %}
